# GPIO for IR beam and servo
CONFIG_GPIO=y

# Serial and console
CONFIG_SERIAL=y
CONFIG_CONSOLE=y
CONFIG_PRINTK=y
CONFIG_STDOUT_CONSOLE=y

# State machine framework
CONFIG_SMF=y

# Shell
CONFIG_SHELL=y
CONFIG_SHELL_BACKEND_SERIAL=y

# Logging
CONFIG_LOG=y

# PWM for servo (when ready)
CONFIG_PWM=y

